<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Team Icon Generator</title>
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f0f0; }
  .icon {
    width: 512px; height: 512px;
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
    border-radius: 96px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .icon::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .letter {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 200px; font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    position: relative; z-index: 1;
  }
  .team-text {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 64px; font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 16px;
    position: relative; z-index: 1;
    margin-top: -10px;
  }
  p { margin-top: 20px; color: #666; font-family: sans-serif; font-size: 14px; }
</style>
</head>
<body>
  <div>
    <div class="icon">
      <span class="letter">A</span>
      <span class="team-text">TEAM</span>
    </div>
    <p>이 아이콘을 마우스 우클릭 → "이미지로 저장" 또는 스크린샷으로 캡처하세요 (512x512)</p>
  </div>
</body>
</html>
